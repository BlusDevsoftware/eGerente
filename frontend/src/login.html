<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - E-Gerente</title>
    <link rel="icon" type="image/png" href="../Imagens/logo2.png">
    <link rel="stylesheet" href="../Paginas_CSS/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../Paginas_CSS/login.css">
    <style>
        .loading-spinner {
            display: none;
            margin-left: 8px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn-entrar {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-entrar:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .success-message {
            display: none;
            color: #28a745;
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            text-align: center;
        }

        .error-message {
            display: none;
            color: #dc3545;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            text-align: center;
        }

        .form-group input:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 2px rgba(0, 123, 255, 0.25);
        }

        .btn-entrar:hover:not(:disabled) {
            background: #0056b3;
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(0, 123, 255, 0.3);
        }

        .btn-entrar:active:not(:disabled) {
            transform: translateY(0);
        }

        .input-group {
            position: relative;
        }

        .input-group input {
            padding-right: 40px;
        }

        .input-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            cursor: pointer;
            transition: color 0.3s;
        }

        .input-icon:hover {
            color: #007bff;
        }
    </style>
</head>
<body>
    <!-- Formas decorativas -->
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h2>Bem vindo ao <span class="highlight">Gestor de Comissões</span></h2>
                <p>Preencha os dados do login para acessar</p>
            </div>
            
            <div class="error-message" style="display: none;"></div>
            <div class="success-message" style="display: none;"></div>

            <form action="/login" method="POST" class="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-group">
                        <input type="email" id="email" name="email" placeholder="Digite seu email" required>
                        <i class="input-icon fas fa-envelope"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label for="senha">Senha</label>
                    <div class="input-group">
                        <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
                        <i class="input-icon fas fa-eye toggle-password"></i>
                    </div>
                </div>
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember">
                        <span>Lembrar-me</span>
                    </label>
                    <a href="#" class="forgot-password">Esqueceu a senha?</a>
                </div>
                <button type="submit" class="btn-entrar">
                    <span class="btn-text">Entrar</span>
                    <i class="fas fa-arrow-right btn-icon"></i>
                    <i class="fas fa-spinner loading-spinner"></i>
                </button>
            </form>
        </div>
        <div class="login-message">
            <div class="logo-container">
                <img src="../Imagens/logo2.png" alt="BlueDev Logo" class="login-logo">
            </div>
            <h2>Faça o Login em nossa<br>Plataforma</h2>
        </div>
        <div class="developer-credit">
            Desenvolvido por <span>Magno Michel</span>
        </div>
    </div>

    <script>
        // Toggle password visibility
        document.querySelector('.toggle-password').addEventListener('click', function() {
            const senhaInput = document.getElementById('senha');
            const type = senhaInput.getAttribute('type') === 'password' ? 'text' : 'password';
            senhaInput.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        // Função para validar email
        function validarEmail(email) {
            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return regex.test(email);
        }

        // Função para mostrar mensagem de erro
        function mostrarErro(mensagem) {
            const errorMessage = document.querySelector('.error-message');
            errorMessage.textContent = mensagem;
            errorMessage.style.display = 'block';
            
            // Auto-hide após 5 segundos
            setTimeout(() => {
                errorMessage.style.display = 'none';
            }, 5000);
        }

        // Função para mostrar mensagem de sucesso
        function mostrarSucesso(mensagem) {
            const successMessage = document.querySelector('.success-message');
            successMessage.textContent = mensagem;
            successMessage.style.display = 'block';
            
            // Auto-hide após 3 segundos
            setTimeout(() => {
                successMessage.style.display = 'none';
            }, 3000);
        }

        // Função para resetar botão
        function resetarBotao() {
            const btnEntrar = document.querySelector('.btn-entrar');
            const btnText = document.querySelector('.btn-text');
            const btnIcon = document.querySelector('.btn-icon');
            const loadingSpinner = document.querySelector('.loading-spinner');
            
            btnEntrar.disabled = false;
            btnIcon.style.display = 'inline-block';
            loadingSpinner.style.display = 'none';
            btnText.textContent = 'Entrar';
        }

        // Função para ativar loading
        function ativarLoading() {
            const btnEntrar = document.querySelector('.btn-entrar');
            const btnText = document.querySelector('.btn-text');
            const btnIcon = document.querySelector('.btn-icon');
            const loadingSpinner = document.querySelector('.loading-spinner');
            
            btnEntrar.disabled = true;
            btnIcon.style.display = 'none';
            loadingSpinner.style.display = 'inline-block';
            btnText.textContent = 'Entrando...';
        }

        // Form submission
        document.querySelector('.login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;
            const errorMessage = document.querySelector('.error-message');
            const successMessage = document.querySelector('.success-message');
            
            // Reset messages
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            
            // Validações
            if (!email || !senha) {
                mostrarErro('Por favor, preencha todos os campos');
                return;
            }
            
            if (!validarEmail(email)) {
                mostrarErro('Por favor, digite um email válido');
                return;
            }
            
            if (senha.length < 6) {
                mostrarErro('A senha deve ter pelo menos 6 caracteres');
                return;
            }
            
            // Ativar loading
            ativarLoading();
            
            try {
                console.log('🔐 Tentando fazer login...', { email });
                
                const response = await fetch('https://e-gerente.vercel.app/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, senha })
                });

                console.log('📡 Status da resposta:', response.status);
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('✅ Login realizado com sucesso:', data);
                    
                    // Salvar dados no localStorage
                    localStorage.setItem('token', data.data.accessToken);
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                    
                    // Mostrar mensagem de sucesso
                    mostrarSucesso('Login realizado com sucesso! Redirecionando...');
                    
                    // Verificar se é primeiro acesso
                    setTimeout(() => {
                        if (data.data.user.primeiro_acesso) {
                            console.log('🔄 Primeiro acesso - redirecionando para troca de senha');
                            window.location.href = 'trocar-senha.html';
                        } else {
                            console.log('🏠 Acesso normal - redirecionando para dashboard');
                            window.location.href = 'index.html';
                        }
                    }, 1500);
                    
                } else {
                    const errorData = await response.json();
                    console.error('❌ Erro no login:', errorData);
                    
                    let mensagemErro = 'Credenciais inválidas';
                    
                    if (response.status === 401) {
                        mensagemErro = 'Email ou senha incorretos';
                    } else if (response.status === 404) {
                        mensagemErro = 'Usuário não encontrado';
                    } else if (response.status === 500) {
                        mensagemErro = 'Erro interno do servidor. Tente novamente.';
                    } else if (errorData.message) {
                        mensagemErro = errorData.message;
                    }
                    
                    mostrarErro(mensagemErro);
                    resetarBotao();
                }
                
            } catch (error) {
                console.error('💥 Erro ao fazer login:', error);
                mostrarErro('Erro ao conectar ao servidor. Verifique sua conexão.');
                resetarBotao();
            }
        });
    </script>
    <script src="scripts/navigation.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</body>
</html>
