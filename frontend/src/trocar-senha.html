<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trocar Senha - Gestor de Comissões</title>
    <link rel="icon" type="image/png" href="../Imagens/logo2.png">
    <link rel="stylesheet" href="../Paginas_CSS/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../Paginas_CSS/login.css">
    <style>
        .change-password-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }

        .change-password-form {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-header h2 {
            color: #333;
            margin-bottom: 10px;
        }

        .form-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #333;
        }

        .input-group {
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 12px 40px 12px 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #007bff;
        }

        .input-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            cursor: pointer;
        }

        .btn-trocar {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-trocar:hover {
            background: #0056b3;
        }

        .btn-trocar:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .loading-spinner {
            display: none;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            display: none;
            color: #dc3545;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            text-align: center;
        }

        .success-message {
            display: none;
            color: #28a745;
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            text-align: center;
        }

        .password-requirements {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            padding: 15px;
            margin-top: 10px;
            font-size: 14px;
        }

        .password-requirements h4 {
            margin: 0 0 10px 0;
            color: #495057;
            font-size: 14px;
        }

        .password-requirements ul {
            margin: 0;
            padding-left: 20px;
            color: #6c757d;
        }

        .password-requirements li {
            margin-bottom: 5px;
        }

        .requirement-valid {
            color: #28a745;
        }

        .requirement-invalid {
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="change-password-container">
            <div class="change-password-form">
                <div class="form-header">
                    <h2><i class="fas fa-key"></i> Trocar Senha</h2>
                    <p>Você precisa trocar sua senha temporária por uma nova senha</p>
                </div>

                <div class="error-message" style="display: none;"></div>
                <div class="success-message" style="display: none;"></div>

                <form id="changePasswordForm">
                    <div class="form-group">
                        <label for="senha_atual">Senha Atual (Temporária)</label>
                        <div class="input-group">
                            <input type="password" id="senha_atual" name="senha_atual" placeholder="Digite sua senha temporária" required>
                            <i class="input-icon fas fa-eye toggle-password" data-target="senha_atual"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="nova_senha">Nova Senha</label>
                        <div class="input-group">
                            <input type="password" id="nova_senha" name="nova_senha" placeholder="Digite sua nova senha" required>
                            <i class="input-icon fas fa-eye toggle-password" data-target="nova_senha"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmar_senha">Confirmar Nova Senha</label>
                        <div class="input-group">
                            <input type="password" id="confirmar_senha" name="confirmar_senha" placeholder="Confirme sua nova senha" required>
                            <i class="input-icon fas fa-eye toggle-password" data-target="confirmar_senha"></i>
                        </div>
                    </div>

                    <div class="password-requirements">
                        <h4>Requisitos da Senha:</h4>
                        <ul>
                            <li id="req-length" class="requirement-invalid">Mínimo de 8 caracteres</li>
                            <li id="req-uppercase" class="requirement-invalid">Pelo menos 1 letra maiúscula</li>
                            <li id="req-lowercase" class="requirement-invalid">Pelo menos 1 letra minúscula</li>
                            <li id="req-number" class="requirement-invalid">Pelo menos 1 número</li>
                            <li id="req-special" class="requirement-invalid">Pelo menos 1 caractere especial</li>
                        </ul>
                    </div>

                    <button type="submit" class="btn-trocar">
                        <span class="btn-text">Trocar Senha</span>
                        <i class="fas fa-spinner loading-spinner"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Verificar se usuário está logado
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        
        if (!token || !user.primeiro_acesso) {
            window.location.href = 'login.html';
        }

        // Toggle password visibility
        document.querySelectorAll('.toggle-password').forEach(icon => {
            icon.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                const input = document.getElementById(targetId);
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });
        });

        // Validar requisitos da senha
        function validatePassword(password) {
            const requirements = {
                length: password.length >= 8,
                uppercase: /[A-Z]/.test(password),
                lowercase: /[a-z]/.test(password),
                number: /\d/.test(password),
                special: /[!@#$%^&*(),.?":{}|<>]/.test(password)
            };

            // Atualizar indicadores visuais
            document.getElementById('req-length').className = requirements.length ? 'requirement-valid' : 'requirement-invalid';
            document.getElementById('req-uppercase').className = requirements.uppercase ? 'requirement-valid' : 'requirement-invalid';
            document.getElementById('req-lowercase').className = requirements.lowercase ? 'requirement-valid' : 'requirement-invalid';
            document.getElementById('req-number').className = requirements.number ? 'requirement-valid' : 'requirement-invalid';
            document.getElementById('req-special').className = requirements.special ? 'requirement-valid' : 'requirement-invalid';

            return Object.values(requirements).every(req => req);
        }

        // Event listeners para validação em tempo real
        document.getElementById('nova_senha').addEventListener('input', function() {
            validatePassword(this.value);
        });

        // Form submission
        document.getElementById('changePasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const senhaAtual = document.getElementById('senha_atual').value;
            const novaSenha = document.getElementById('nova_senha').value;
            const confirmarSenha = document.getElementById('confirmar_senha').value;
            
            const btnTrocar = document.querySelector('.btn-trocar');
            const btnText = document.querySelector('.btn-text');
            const loadingSpinner = document.querySelector('.loading-spinner');
            const errorMessage = document.querySelector('.error-message');
            const successMessage = document.querySelector('.success-message');
            
            // Reset messages
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            
            // Validações
            if (!senhaAtual || !novaSenha || !confirmarSenha) {
                errorMessage.textContent = 'Todos os campos são obrigatórios';
                errorMessage.style.display = 'block';
                return;
            }
            
            if (novaSenha !== confirmarSenha) {
                errorMessage.textContent = 'As senhas não coincidem';
                errorMessage.style.display = 'block';
                return;
            }
            
            if (!validatePassword(novaSenha)) {
                errorMessage.textContent = 'A nova senha não atende aos requisitos';
                errorMessage.style.display = 'block';
                return;
            }
            
            // Disable button and show loading
            btnTrocar.disabled = true;
            loadingSpinner.style.display = 'inline-block';
            btnText.textContent = 'Trocando senha...';
            
            try {
                const response = await fetch('https://e-gerente.vercel.app/api/auth/change-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ 
                        senha_atual: senhaAtual, 
                        nova_senha: novaSenha 
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    successMessage.textContent = 'Senha alterada com sucesso! Redirecionando...';
                    successMessage.style.display = 'block';
                    
                    // Atualizar dados do usuário no localStorage
                    const updatedUser = { ...user, primeiro_acesso: false };
                    localStorage.setItem('user', JSON.stringify(updatedUser));
                    
                    // Redirecionar para o sistema
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    const data = await response.json();
                    errorMessage.textContent = data.message || 'Erro ao alterar senha';
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                console.error('Erro ao trocar senha:', error);
                errorMessage.textContent = 'Erro ao conectar ao servidor';
                errorMessage.style.display = 'block';
            } finally {
                // Reset button state
                btnTrocar.disabled = false;
                loadingSpinner.style.display = 'none';
                btnText.textContent = 'Trocar Senha';
            }
        });
    </script>
</body>
</html>
